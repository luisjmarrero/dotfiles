set -g  "@dracula-libre-colors"               "Text Surface0"
set -g  "@dracula-ssh-session-colors"         "Green Surface0"
set -g @dracula-highlight-active-pane true

# Transparent background + rounded separators
set -g @dracula-transparent-powerline-bg true
set -g @dracula-show-left-sep 
set -g @dracula-show-right-sep " "
set -g @dracula-inverse-divider 

# tmux-resurrect
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

set -g @continuum-restore 'on'

# reload config file
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

set-option -g default-command "zsh -i"

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-256color:Tc'

set-option -g detach-on-destroy off
set-option -g destroy-unattached off

set -g allow-passthrough on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "/Users/luismarrero/.tmux/plugins/tpm/tpm"

# -------------------------------------------------------
# Must be after TPM — tmux-sensible overrides these above
# -------------------------------------------------------

# Disable focus events (prevents snap-to-bottom on click)
set -g focus-events off

# Auto-enter copy mode on scroll up
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" \
  "send-keys -M" \
  "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

# Scroll speed in copy mode (3 lines per tick)
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 3 scroll-down

# Click to select pane without exiting copy mode
bind -n MouseDown1Pane select-pane -t = \; send-keys -M

# Stay in copy mode after selecting text (copy-pipe-and-cancel exits, copy-pipe doesn't)
unbind -T copy-mode    MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe

bind -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
  { send-keys -M } \
  { copy-mode -H ; send-keys -X select-word ; run-shell -d 0.3 ; send-keys -X copy-pipe }

bind -T root TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
  { send-keys -M } \
  { copy-mode -H ; send-keys -X select-line ; run-shell -d 0.3 ; send-keys -X copy-pipe }

## Search in tmux:
# When you're in copy mode (Ctrl+b [):
# Press Ctrl+S → starts incremental search forward.
# Press Ctrl+R → searches backward.
# Type your search term and hit Enter.
# Hit n to repeat the search in the same direction, N for the opposite.