disabled = true

[python]
symbol = "оҲө "
style = "bold sky"

[ruby]
symbol = "оһ‘ "
style = "bold maroon"
format = '[$symbol($version )]($style)'

[rust]
symbol = "оһЁ "

[scala]
symbol = "оң· "

[username]
disabled = true

[custom.docker-enabled]
description = "Shows the docker symbol if the current directory has Dockerfile or docker-compose.yml files"
command = 'echo пҢҲ'
files = ["Dockerfile", "docker-compose.yml", "docker-compose.yaml"]
when = """ command -v docker &> /dev/null; exit (echo $?); """
format = '[ $output ]($style)'
style = "bold blue"

[custom.rails]
# command = "bundle exec rails -v | sed 's/Rails //'" # slow
command = "grep -E ' rails \\([0-9]' Gemfile.lock | sed -E 's/.*rails \\(([^)]+)\\).*/\\1/'"
detect_files = ['Gemfile.lock']
symbol = "оң»"
style = "bg:color_blue"
format = '[[ $symbol( v$output) ](fg:color_fg0 bg:color_blue)]($style)'

