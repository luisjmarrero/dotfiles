palette = 'catppuccin_mocha'

add_newline = true

continuation_prompt = 'в–¶в–¶ '

# A minimal left prompt
format = """
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$hg_branch\
$line_break\
$character"""

# move the rest of the prompt to the right
right_format = """
$python\
$nodejs\
$ruby\
$all"""

[aws]
symbol = "оҢҪ "

[c]
symbol = "оҳһ "

[character]
success_symbol = "[оӘң](bold green)"
error_symbol = "[вңҳ](bold red)"

[cmd_duration]
min_time = 10_000                    # Show command duration over 10,000 milliseconds (=10 sec)
format = " took [$duration]($style)"
show_milliseconds = false
disabled = false
style = "italic yellow"

[dart]
symbol = "оһҳ "

[directory]
truncation_length = 3
truncation_symbol = " у°қ° "
home_symbol = "у°Ӣң ~"
read_only = " пҖЈ "
style = "bold sapphire"
read_only_style = "bold red"
format = '[$path]($style)[$read_only]($read_only_style) '

[directory.substitutions]
"Documents" = " у°Ҳҷ "
"Downloads" = "пҖҷ"
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
# symbol = "пҗҳ "
symbol = "оӮ  "
style = "bold mauve"

[git_status]
format = '([$all_status $ahead_behind]($style))'
# style = "red bold"
style = "bold flamingo"

conflicted = "оң§"    # nf-dev-git_merge
# conflicted = "пҒұ"
# ahead      = "уұһ«"    # nf-oct-arrow_up
ahead      = "пҗұ"
behind     = "пҒЈ"    # nf-oct-arrow_down
diverged   = "у°Ғң"    # nf-dev-git_branch
# up_to_date = "вң“"
up_to_date = ''
untracked  = "пҗ "    # nf-oct-file
stashed    = "о¬©"    # nf-oct-archive
modified   = "п‘ҷ"    # nf-oct-pencil
staged     = "п‘—"    # nf-fa-plus_square
renamed    = "п‘ҡ"    # nf-oct-arrow_right
deleted    = "п‘ҳ"    # nf-oct-trashcan

# untracked = "пҗ  $count "
# modified = "п‘ҷ $count "
# deleted = "п‘ҳ $count "
# staged = "п‘— $count "
# renamed = "п‘ҡ $count "
# stashed = "пғҮ $count "

[git_metrics]
added_style = 'bold green'
only_nonzero_diffs = true
disabled = false
format = ' [+$added]($added_style)/[-$deleted]($deleted_style) '

[golang]
symbol = "оҳ§ "

[guix_shell]
symbol = "пҢҘ "

[hg_branch]
symbol = "пҗҳ "

[hostname]
ssh_only = false
format = '[at $ssh_symbol$hostname ]($style)'
trim_at = "."
disabled = true

[java]
format = '[${symbol}(${version} )]($style)'
symbol = "оү– "
style = "red"
version_format = 'v${raw}'

[kubernetes]
format = 'on [пҲҡ $context\($namespace\)](bold purple) '
disabled = true

[memory_usage]
symbol = "у°Қӣ "

[nim]
symbol = "пҡӨ "

[nix_shell]
symbol = "пҢ“ "

[nodejs]
symbol = "оңҳ "
style = "bold green"
format = '[$symbol($version )]($style)'

[os]
format = "[$symbol]($style)"
disabled = true
style = 'white'

[os.symbols]
Alpine = "пҢҖ "
